name: Atualizar Noticias

on:
  schedule:
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests feedparser

      - name: Buscar noticias
        run: python3 fetch_news.py

      - name: Commit e push
        run: |
          git config user.name "Prev Saude Bot"
          git config user.email "actions@github.com"
          git add news.json
          git diff --staged --quiet || git commit -m "Noticias $(date +'%d/%m/%Y %H:%M')"
          git push
