name: Atualizar Noticias

on:
  schedule:
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rodar script
        run: python3 fetch_news.py

      - name: Salvar news.json
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add news.json
          git diff --staged --quiet || git commit -m "noticias $(date +'%d/%m/%Y')"
          git push
