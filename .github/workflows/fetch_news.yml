name: Atualizar Notícias

on:
  schedule:
    # Roda de segunda a sexta às 9h de Brasília (12h UTC)
    - cron: '0 12 * * 1-5'
  workflow_dispatch:
    # Permite rodar manualmente pela aba Actions do GitHub

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Buscar notícias e gerar news.json
        run: python3 fetch_news.py

      - name: Commit e push do news.json
        run: |
          git config user.name "Prev & Saúde Bot"
          git config user.email "actions@github.com"
          git add news.json
          git diff --staged --quiet || git commit -m "Noticias atualizadas $(date +'%d/%m/%Y as %H:%M')"
          git push
